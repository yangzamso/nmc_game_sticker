<svg viewBox="0 0 265 302" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 바디 전체: 상단 하이라이트 → 플랫 → 하단으로 갈수록 살짝 어두워짐 (원본 픽셀 샘플링 기준) -->
    <linearGradient id="body" x1="0" y1="72" x2="0" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eaeaea" />
      <stop offset="0.15" stop-color="#dedede" />
      <stop offset="0.5" stop-color="#d9d9d9" />
      <stop offset="0.85" stop-color="#d6d6d6" />
      <stop offset="1" stop-color="#d1d1d1" />
    </linearGradient>
    <!-- 슬롯: 진입 그림자 → 어두운 슬롯 라인 → 하단 반사 하이라이트 → 바디 색으로 복귀 -->
    <linearGradient id="slot" x1="0" y1="87" x2="0" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8d8d8" />
      <stop offset="0.16" stop-color="#c9c9c9" />
      <stop offset="0.32" stop-color="#1e1e1e" />
      <stop offset="0.47" stop-color="#121212" />
      <stop offset="0.63" stop-color="#3a3a3a" />
      <stop offset="0.68" stop-color="#5d5d5d" />
      <stop offset="0.74" stop-color="#dadada" />
      <stop offset="0.79" stop-color="#efefef" />
      <stop offset="0.86" stop-color="#dedede" />
      <stop offset="1" stop-color="#d8d8d8" />
    </linearGradient>
  </defs>

  <!-- 프린터 바디: x=31~232, y=72~118 (원본 265x302 래스터에서 실측), 코너 radius≈9 -->
  <rect x="31" y="72" width="201" height="46" rx="9" ry="9" fill="url(#body)" />

  <!-- 슬롯 그루브: 바디 폭의 약 72%(60~204), 그림자→슬롯→하이라이트 밴드를 하나의 그라디언트로 표현 -->
  <rect x="60" y="87" width="144" height="19" rx="6" ry="6" fill="url(#slot)" />
</svg>
