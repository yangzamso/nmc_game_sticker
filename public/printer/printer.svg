<svg viewBox="0 0 265 302" width="265" height="302" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 바디 전체: 위쪽은 햇빛 받은 듯 밝게, 아래로 갈수록 그림자져 어두워지는 입체 그라디언트 -->
    <linearGradient id="body" x1="0" y1="72" x2="0" y2="118" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fcfcfc" />
      <stop offset="0.12" stop-color="#f1f1f1" />
      <stop offset="0.32" stop-color="#dcdcdc" />
      <stop offset="0.55" stop-color="#c8c8c8" />
      <stop offset="0.8" stop-color="#b6b6b6" />
      <stop offset="1" stop-color="#a6a6a6" />
    </linearGradient>
    <!-- 상단 하이라이트 밴드: 빛이 정면으로 닿는 부분을 한 번 더 밝혀 광택감 추가 -->
    <linearGradient id="sheen" x1="0" y1="72" x2="0" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <!-- 슬롯: 진입 그림자 → 어두운 슬롯 라인 → 하단 반사 하이라이트 → 바디 색으로 복귀 -->
    <linearGradient id="slot" x1="0" y1="87" x2="0" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8d8d8" />
      <stop offset="0.16" stop-color="#c9c9c9" />
      <stop offset="0.32" stop-color="#1e1e1e" />
      <stop offset="0.47" stop-color="#121212" />
      <stop offset="0.63" stop-color="#3a3a3a" />
      <stop offset="0.68" stop-color="#5d5d5d" />
      <stop offset="0.74" stop-color="#dadada" />
      <stop offset="0.79" stop-color="#efefef" />
      <stop offset="0.86" stop-color="#dedede" />
      <stop offset="1" stop-color="#d8d8d8" />
    </linearGradient>
    <clipPath id="bodyClip">
      <rect x="27" y="72" width="211" height="46" rx="9" ry="9" />
    </clipPath>
  </defs>

  <!-- 프린터 바디: x=27~238(도형 표시폭 380px 기준 확장), y=72~118(높이는 원본 그대로 유지), 코너 radius≈9 -->
  <rect x="27" y="72" width="211" height="46" rx="9" ry="9" fill="url(#body)" />

  <!-- 슬롯 그루브: 표시폭 320px로 조정 -->
  <rect x="44" y="87" width="177" height="19" rx="6" ry="6" fill="url(#slot)" />

  <!-- 상단 광택 하이라이트: 라운드 코너를 넘지 않도록 바디 모양으로 클립 -->
  <rect x="27" y="72" width="211" height="18" clip-path="url(#bodyClip)" fill="url(#sheen)" />
</svg>
